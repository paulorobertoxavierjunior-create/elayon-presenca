<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manutenção • Elayon Presença</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="manutencao">
  <main class="app-shell">
    <section class="hero-card">
      <div class="hero-badge">Integridade do sistema</div>
      <h1 class="hero-title">Painel interno</h1>
      <p class="hero-subtitle">
        Área reservada para checagem de canais, serviços e estabilidade do sistema.
      </p>

      <div class="hero-actions">
        <button class="btn btn-primary" id="btnRefreshSystem">Atualizar status</button>
        <a class="btn btn-secondary" href="painel.html">Voltar</a>
      </div>
    </section>

    <section class="grid-two">
      <article class="info-card">
        <h2>Supabase</h2>
        <p id="statusSupabase">Pendente</p>
      </article>

      <article class="info-card">
        <h2>CRS</h2>
        <p id="statusCRS">Pendente</p>
      </article>

      <article class="info-card">
        <h2>TTS</h2>
        <p id="statusTTS">Pendente</p>
      </article>

      <article class="info-card">
        <h2>Microfone</h2>
        <p id="statusMic">Pendente</p>
      </article>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
