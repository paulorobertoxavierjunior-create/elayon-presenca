<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELAYON - Central de Conexão</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d0d0d; color: #00ff41; padding: 20px; line-height: 1.4; }
        .config-panel { border: 2px solid #00ff41; padding: 20px; margin-bottom: 20px; background: #1a1a1a; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #fff; }
        input { width: 100%; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; box-sizing: border-box; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { background: #00ff41; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #fff; }
        button.danger { background: #ff4444; color: #fff; }
        #log-window { background: #000; border: 1px solid #444; height: 400px; overflow-y: auto; padding: 15px; font-size: 13px; color: #00d2ff; }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .err { color: #ff4444; font-weight: bold; }
        .success { color: #00ff41; }
        .highlight { color: #ff00ff; }
    </style>
</head>
<body>

    <h2>[ELAYON PRESENÇA] - TESTE DE FLUXO E CONEXÃO</h2>

    <div class="config-panel">
        <div class="input-group">
            <label>SUPABASE_PROJECT_URL</label>
            <input type="text" id="url" value="https://eudcjihffrfmhzmfwtlg.supabase.co">
        </div>
        <div class="input-group">
            <label>SUPABASE_ANON_KEY</label>
            <input type="text" id="anon_key" placeholder="Cole aqui sua chave pública (anon key)">
        </div>
        <div class="input-group">
            <label>EMAIL PARA TESTE (Crie um novo para cada teste)</label>
            <input type="email" id="test_email" placeholder="ex: teste1@elayon.com">
        </div>
        <div class="input-group">
            <label>SENHA PARA TESTE</label>
            <input type="password" id="test_pass" value="Elayon@2024">
        </div>
        
        <div class="controls">
            <button onclick="initSupabase()">1. Inicializar/Testar Conexão</button>
            <button onclick="runSignUp()">2. Criar Conta (Simular Fluxo)</button>
            <button onclick="runSignIn()">3. Testar Login (Pós-Confirmação)</button>
            <button onclick="checkSession()">4. Verificar Sessão</button>
            <button onclick="runSignOut()" class="danger">5. Limpar Sessão (Logout)</button>
            <button onclick="clearLogs()" style="background: #444; color: #fff;">Limpar Logs</button>
        </div>
    </div>

    <div id="log-window">--- Aguardando Inicialização ---</div>

    <script>
        let supabaseClient = null;
        const logWindow = document.getElementById('log-window');

        function log(msg, type = '') {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `[${time}] ${msg}`;
            logWindow.prepend(entry);
            console.log(`[${time}]`, msg);
        }

        function clearLogs() { logWindow.innerHTML = '--- Logs Limpos ---'; }

        function initSupabase() {
            const url = document.getElementById('url').value;
            const key = document.getElementById('anon_key').value;

            if (!key) {
                log("ERRO: Você precisa colar a ANON KEY!", "err");
                return;
            }

            try {
                supabaseClient = supabase.createClient(url, key);
                log("Supabase inicializado localmente no navegador.", "success");
                log("DICA: Tente realizar uma operação para validar a chave contra o servidor.");
            } catch (e) {
                log("Falha crítica na inicialização: " + e.message, "err");
            }
        }

        async function runSignUp() {
            if (!supabaseClient) return log("Inicialize primeiro!", "err");
            const email = document.getElementById('test_email').value;
            const password = document.getElementById('test_pass').value;

            log(`Iniciando fluxo de cadastro para: <span class="highlight">${email}</span>`);
            
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    emailRedirectTo: window.location.href // Volta para esta página após confirmar
                }
            });

            if (error) {
                log("ERRO NO CADASTRO: " + error.message, "err");
                if(error.status === 429) log("⚠️ RATE LIMIT: O Supabase bloqueou por excesso de tentativas. Aguarde.", "err");
            } else {
                log("CADASTRO REALIZADO COM SUCESSO!", "success");
                log("ID do Usuário: " + data.user.id);
                log("ESTADO: Esperando confirmação por e-mail (Verifique sua caixa de entrada).", "highlight");
            }
        }

        async function runSignIn() {
            if (!supabaseClient) return log("Inicialize primeiro!", "err");
            const email = document.getElementById('test_email').value;
            const password = document.getElementById('test_pass').value;

            log(`Tentando Login Manual: ${email}...`);
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                log("ERRO NO LOGIN: " + error.message, "err");
                log("Lembrete: O login só funciona após você clicar no link do e-mail.", "highlight");
            } else {
                log("LOGIN BEM-SUCEDIDO! Usuário autenticado.", "success");
                log("JWT Token gerado e armazenado no LocalStorage.");
            }
        }

        async function checkSession() {
            if (!supabaseClient) return log("Inicialize primeiro!", "err");
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            
            if (session) {
                log("SESSÃO ATIVA encontrada!", "success");
                log("Usuário: " + session.user.email);
                log("Expira em: " + new Date(session.expires_at * 1000).toLocaleString());
            } else {
                log("Nenhuma sessão ativa no navegador.", "highlight");
            }
        }

        async function runSignOut() {
            if (!supabaseClient) return log("Inicialize primeiro!", "err");
            const { error } = await supabaseClient.auth.signOut();
            if (error) log("Erro ao sair: " + error.message, "err");
            else log("Logout efetuado. LocalStorage limpo.");
        }
    </script>
</body>
</html>
