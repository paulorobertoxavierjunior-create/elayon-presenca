<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acessar • Elayon Presença</title>
  <meta name="description" content="Acesse sua conta no Elayon Presença.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="login">
  <main class="app-shell">
    <section class="form-card">
      <div class="hero-badge">Acesso</div>

      <h1 class="form-title">Acessar</h1>
      <p class="form-subtitle">
        Entre com seu e-mail e senha para acessar o Elayon Presença.
      </p>

      <form id="loginForm" class="form-stack" novalidate>
        <label for="loginEmail">E-mail</label>
        <input
          id="loginEmail"
          name="loginEmail"
          type="email"
          placeholder="seuemail@exemplo.com"
          autocomplete="username"
          required
        >

        <label for="loginPassword">Senha</label>
        <div class="password-wrap">
          <input
            id="loginPassword"
            name="loginPassword"
            type="password"
            placeholder="Digite sua senha"
            autocomplete="current-password"
            required
          >
          <button
            type="button"
            class="toggle-password"
            data-target="loginPassword"
            aria-label="Mostrar ou ocultar senha"
          >
            👁
          </button>
        </div>

        <button class="btn btn-primary" id="btnLoginSubmit" type="submit">
          Entrar no sistema
        </button>
      </form>

      <div id="loginMessage" class="form-message">
        Informe seus dados para entrar.
      </div>

      <div class="hero-actions top-gap">
        <a class="btn btn-secondary" href="cadastro.html">Criar acesso</a>
        <a class="btn btn-secondary" href="index.html">Voltar</a>
      </div>

      <div class="hero-links top-gap">
        <a href="cadastro.html">Ainda não tem conta? Criar acesso</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
