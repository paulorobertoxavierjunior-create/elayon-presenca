<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acessar • Elayon Presença</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="login">
  <main class="app-shell">
    <section class="form-card">
      <div class="hero-badge">Acesso</div>
      <h1 class="form-title">Acessar</h1>
      
      <form id="loginForm" class="form-stack">
        <label>E-mail</label>
        <input id="loginEmail" type="email" placeholder="seuemail@exemplo.com" required>

        <label>Senha</label>
        <div class="password-wrap">
          <input id="loginPassword" type="password" placeholder="Sua senha" required>
          <button type="button" class="toggle-password" data-target="loginPassword">👁</button>
        </div>

        <button class="btn btn-primary" type="submit">Entrar no sistema</button>
      </form>

      <div id="loginMessage" class="form-message">Informe seus dados para entrar.</div>

      <div class="hero-actions top-gap">
        <a class="btn btn-secondary" href="cadastro.html">Criar acesso</a>
        <a class="btn btn-secondary" href="index.html">Voltar</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
