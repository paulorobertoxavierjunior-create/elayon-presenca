<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar acesso • Elayon Presença</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body data-page="cadastro">
  <main class="app-shell">
    <section class="form-card">
      <h1>Criar acesso</h1>

      <form id="signupForm">
        <input id="signupName" type="text" placeholder="Seu nome" required>
        <input id="signupEmail" type="email" placeholder="E-mail" required>

        <div>
          <input id="signupPassword" type="password" placeholder="Senha" required>
          <button type="button" onclick="togglePassword('signupPassword')">👁</button>
        </div>

        <div>
          <input id="signupPasswordConfirm" type="password" placeholder="Confirmar senha" required>
          <button type="button" onclick="togglePassword('signupPasswordConfirm')">👁</button>
        </div>

        <button id="btnSignup" type="submit">Criar acesso</button>
      </form>

      <p id="signupMessage">Aguardando...</p>

      <pre id="debugBox" style="font-size:11px;background:#111;color:#0f0;padding:10px;margin-top:20px;max-height:220px;overflow:auto;">Logs:</pre>

      <br>
      <a href="login.html">Já tenho acesso</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const DEBUG = document.getElementById("debugBox");
    const signupMessage = document.getElementById("signupMessage");
    const signupForm = document.getElementById("signupForm");

    function log(msg) {
      console.log("[CADASTRO]", msg);
      DEBUG.textContent += "\n" + (typeof msg === "string" ? msg : JSON.stringify(msg, null, 2));
    }

    function togglePassword(id) {
      const input = document.getElementById(id);
      if (!input) return;
      input.type = input.type === "password" ? "text" : "password";
    }

    window.onerror = function (msg, url, line) {
      log("ERRO JS: " + msg + " | linha: " + line);
    };

    console.log("JS CARREGOU");
    alert("JS OK");
    log("JS CARREGOU");

    if (!window.supabase || !window.supabase.createClient) {
      log("SDK do Supabase NÃO carregou");
      signupMessage.textContent = "Falha ao carregar o SDK do Supabase.";
    }

    const supabase = window.supabase.createClient(
      "https://eudcjihffrfmhzmfwtlg.supabase.co",
      "COLE_AQUI_A_ANON_KEY_COMPLETA"
    );

    log("Cliente Supabase criado");

    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      alert("SUBMIT DISPAROU");
      log("SUBMIT DISPAROU");

      const nome = document.getElementById("signupName").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value.trim();
      const confirm = document.getElementById("signupPasswordConfirm").value.trim();

      if (!nome || !email || !password || !confirm) {
        signupMessage.textContent = "Preencha todos os campos.";
        log("Validação falhou: campos vazios");
        return;
      }

      if (password !== confirm) {
        signupMessage.textContent = "Senhas não coincidem.";
        log("Validação falhou: senhas não coincidem");
        return;
      }

      const redirectTo = "https://paulorobertoxavierjunior-create.github.io/elayon-presenca/login.html";
      log({ nome, email, redirectTo });

      signupMessage.textContent = "Criando acesso...";

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: redirectTo,
          data: { nome }
        }
      });

      log({ data, error });

      if (error) {
        let msg = error.message || "Erro ao criar acesso.";

        if (msg.toLowerCase().includes("email rate limit exceeded")) {
          msg = "Muitas tentativas de envio foram feitas em pouco tempo. Aguarde um pouco e tente novamente.";
        }

        if (msg.toLowerCase().includes("user already registered")) {
          msg = "Este e-mail já está cadastrado. Tente entrar no sistema.";
        }

        signupMessage.textContent = msg;
        return;
      }

      signupMessage.textContent = "Conta criada. Verifique seu e-mail.";
      log("Conta criada com sucesso. Redirecionando para obrigado-cadastro.html");

      setTimeout(() => {
        window.location.href = "obrigado-cadastro.html";
      }, 1000);
    });
  </script>
</body>
</html>
