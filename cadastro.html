<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar acesso • Elayon Presença</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body data-page="cadastro">
  <main class="app-shell">
    <section class="form-card">

      <h1>Criar acesso</h1>

      <form id="signupForm">
        <input id="signupName" type="text" placeholder="Seu nome" required>
        <input id="signupEmail" type="email" placeholder="E-mail" required>

        <div>
          <input id="signupPassword" type="password" placeholder="Senha" required>
          <button type="button" onclick="toggle('signupPassword')">👁</button>
        </div>

        <div>
          <input id="signupPasswordConfirm" type="password" placeholder="Confirmar senha" required>
          <button type="button" onclick="toggle('signupPasswordConfirm')">👁</button>
        </div>

        <button type="submit">Criar acesso</button>
      </form>

      <p id="signupMessage">Aguardando...</p>

      <pre id="debugBox" style="font-size:11px;background:#111;color:#0f0;padding:10px;margin-top:20px;max-height:200px;overflow:auto;">
Logs:
</pre>

      <br>
      <a href="login.html">Já tenho acesso</a>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const DEBUG = document.getElementById("debugBox");

    function log(msg) {
      console.log(msg);
      DEBUG.textContent += "\n" + JSON.stringify(msg, null, 2);
    }

    function toggle(id) {
      const input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
    }

    const supabase = window.supabase.createClient(
      "https://eudcjihffrfmhzmfwtlg.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    );

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      log("INICIO SIGNUP");

      const nome = signupName.value;
      const email = signupEmail.value;
      const password = signupPassword.value;
      const confirm = signupPasswordConfirm.value;

      if (password !== confirm) {
        signupMessage.textContent = "Senhas não coincidem";
        return;
      }

      const redirectTo = "https://paulorobertoxavierjunior-create.github.io/elayon-presenca/login.html";

      log({ nome, email, redirectTo });

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: redirectTo,
          data: { nome }
        }
      });

      log({ data, error });

      if (error) {
        signupMessage.textContent = error.message;
        return;
      }

      signupMessage.textContent = "Conta criada. Verifique seu e-mail.";

      setTimeout(() => {
        window.location.href = "obrigado-cadastro.html";
      }, 1000);
    });
  </script>
</body>
</html>
